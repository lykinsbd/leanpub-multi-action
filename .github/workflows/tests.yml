---
# This action will run the integration and unit tests, as well as all linters
name: "Test Runner"

"on":
  push:
    branches: ["dev", "brett/*"]
  pull_request:
    branches: ["dev"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: null

jobs:
  black:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: black"
        run: "uv run invoke black"
  isort:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: isort"
        run: "uv run invoke isort"
    needs:
      - "black"
  bandit:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: bandit"
        run: "uv run invoke bandit"
    needs:
      - "black"
  pydocstyle:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: pydocstyle"
        run: "uv run invoke pydocstyle"
    needs:
      - "black"
  flake8:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: flake8"
        run: "uv run invoke flake8"
    needs:
      - "black"
  yamllint:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: yamllint"
        run: "uv run invoke yamllint"
    needs:
      - "black"
  pylint:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: Pylint"
        run: "uv run invoke pylint"
    needs:
      - "black"
  pytest:
    strategy:
      fail-fast: true
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Run Tests"
        run: "uv run invoke pytest"
    needs:
      - "black"
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Test building the Python package and Docker container"
        run: "uv run invoke build"
    needs:
      - "isort"
      - "bandit"
      - "pydocstyle"
      - "flake8"
      - "yamllint"
      - "pylint"
      - "pytest"
