---
# This action will run the integration and unit tests, as well as all linters
name: "Test Runner"

"on":
  push:
    branches: ["dev", "brett/*"]
  pull_request:
    branches: ["dev"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: null

jobs:
  ruff:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: ruff"
        run: "uv run invoke ruff"
  yamllint:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: yamllint"
        run: "uv run invoke yamllint"
  pylint:
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Linting: Pylint"
        run: "uv run invoke pylint"
  pytest:
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13", "3.14"]
    runs-on: "ubuntu-latest"
    env:
      INVOKE_LOCAL: "True"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
        with:
          python-version: "${{ matrix.python-version }}"
      - name: "Run Tests"
        run: "uv run invoke pytest"
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out repository code"
        uses: "actions/checkout@v4"
      - name: "Setup environment"
        uses: "./.github/actions/setup-environment"
      - name: "Test building the Python package and Docker container"
        run: "uv run invoke build"
    needs:
      - "ruff"
      - "yamllint"
      - "pylint"
      - "pytest"
