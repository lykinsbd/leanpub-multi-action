---
name: "Setup the environment"
description: "This action sets up uv and installs the project environment."
runs:
  using: "composite"
  steps:
    - name: "Set up Python"
      uses: "actions/setup-python@v5"
      with:
        python-version: "3.9"
    - name: "Install uv"
      uses: "astral-sh/setup-uv@v5"
    - name: "Cache uv"
      uses: "actions/cache@v4"
      with:
        path: "~/.cache/uv"
        key: "${{ runner.os }}-uv-${{ hashFiles('./uv.lock') }}"
    - name: "Install environment"
      shell: "bash"
      run: "uv sync"
