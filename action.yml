---
# action.yml
name: "Leanpub Multi Action"
description: "Interact with Leanpub.com via GitHub Actions."
branding:
  icon: "book-open"
  color: "yellow"
inputs:
  leanpub-api-key:
    description: "Leanpub API Key"
    required: true
  leanpub-book-slug:
    description: "Leanpub Book Slug"
    required: true
  action:
    description: "Action to perform: preview, publish, check-status, book-summary, or book-exists"
    required: true
  email-readers:
    description: "Email readers about the new publish (publish only)"
    required: false
    default: "false"
  release-notes:
    description: "Release notes for the publish (publish only)"
    required: false
  subset:
    description: "Preview only the Subset.txt files (preview only)"
    required: false
    default: "false"
  single-file:
    description: "Path to a Markdown file for single file preview (preview only)"
    required: false
runs:
  using: "docker"
  image: "docker://ghcr.io/lykinsbd/leanpub-multi-action:latest"
  args:
    - "${{ inputs.action }}"
