---
# action.yml
name: "Leanpub Multi Action"
description: "Interact with Leanpub.com via GitHub Actions."
inputs:
  leanpub-api-key:
    description: "Leanpub API Key"
    required: true
  leanpub-book-slug:
    description: "Leanpub Book Slug"
    required: true
  preview:
    description: "Start a Preview job"
    required: false
    default: false
  publish:
    description: "Publish the book"
    required: false
    default: false
  email-readers:
    description: "Email readers about the new publish"
    required: false
    default: false
  release-notes:
    description: "Release notes for the publish"
    required: false
runs:
  using: "docker"
  image: "docker://ghcr.io/lykinsbd/leanpub-multi-action:latest"
  # args:
  #   - "${{ inputs.leanpub-api-key }}"
  #   - "${{ inputs.leanpub-book-slug }}"
  #   - "${{ inputs.preview }}"
